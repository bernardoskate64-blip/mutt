<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUTT — Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808;
      --off-black: #111;
      --white: #f2f0eb;
      --accent: #c8ff00;
      --muted: #555;
      --border: rgba(255,255,255,0.08);
      --ff-title: 'Bebas Neue', sans-serif;
      --ff-body: 'Syne', sans-serif;
      --ff-mono: 'Space Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: var(--ff-body); overflow-x: hidden; cursor: none; }

    .cursor { position: fixed; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .3s,height .3s; mix-blend-mode: difference; }
    .cursor-ring { position: fixed; width: 40px; height: 40px; border: 1.5px solid var(--accent); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width .3s,height .3s,opacity .3s; opacity: .5; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 28px 48px; mix-blend-mode: difference; }
    .nav-logo { font-family: var(--ff-title); font-size: 2rem; letter-spacing: .1em; color: var(--white); text-decoration: none; }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a { font-family: var(--ff-mono); font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--white); text-decoration: none; opacity: .6; transition: opacity .3s; }
    .nav-links a:hover { opacity: 1; }

    #hero { position: relative; height: 100vh; min-height: 700px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
    .hero-left { position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 80px 48px; z-index: 2; }
    .hero-tag { font-family: var(--ff-mono); font-size: .65rem; letter-spacing: .25em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; opacity: 0; animation: fadeUp 1s .4s forwards; }
    .hero-title { font-family: var(--ff-title); font-size: clamp(7rem,14vw,14rem); line-height: .85; letter-spacing: .02em; color: var(--white); opacity: 0; animation: fadeUp 1s .6s forwards; }
    .hero-sub { font-size: .9rem; line-height: 1.7; color: rgba(255,255,255,.45); margin-top: 32px; max-width: 360px; opacity: 0; animation: fadeUp 1s .9s forwards; }
    .hero-sub strong { color: var(--white); }
    .hero-cta { display: inline-flex; align-items: center; gap: 12px; margin-top: 48px; font-family: var(--ff-mono); font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--black); background: var(--accent); padding: 16px 32px; text-decoration: none; transition: background .3s,transform .3s; opacity: 0; animation: fadeUp 1s 1.1s forwards; }
    .hero-cta:hover { background: #fff; transform: translateX(4px); }
    .hero-right { position: relative; overflow: hidden; }
    .hero-right img { width: 100%; height: 100%; object-fit: cover; object-position: center top; filter: sepia(.2) contrast(1.1); transition: transform 8s ease; }
    .hero-right:hover img { transform: scale(1.04); }
    .hero-right::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right,var(--black) 0%,transparent 30%), linear-gradient(to top,var(--black) 0%,transparent 30%); }

    section { padding: 120px 48px; }
    #music h2 { font-family: var(--ff-title); font-size: clamp(3.5rem,6vw,6rem); line-height: .9; margin-bottom: 64px; }
    .music-platforms { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; }
    .platform-card { display: flex; flex-direction: column; justify-content: space-between; padding: 48px; background: var(--off-black); border: 1px solid var(--border); text-decoration: none; color: var(--white); transition: background .3s,border-color .3s; min-height: 240px; position: relative; overflow: hidden; }
    .platform-card:hover { background: #161616; border-color: rgba(255,255,255,.15); }
    .platform-name { font-family: var(--ff-title); font-size: 2.2rem; letter-spacing: .05em; }

    #connect { border-top: 1px solid var(--border); text-align: center; }
    #connect h2 { font-family: var(--ff-title); font-size: clamp(4rem,9vw,10rem); line-height: .9; letter-spacing: .01em; margin-bottom: 64px; }
    .social-grid { display: flex; justify-content: center; gap: 2px; flex-wrap: wrap; }
    .social-link { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; padding: 36px 48px; background: var(--off-black); border: 1px solid var(--border); text-decoration: none; color: var(--white); min-width: 220px; transition: background .3s,border-color .3s; position: relative; overflow: hidden; }
    .social-link:hover { background: #161616; border-color: rgba(255,255,255,.2); }
    .social-platform { font-family: var(--ff-mono); font-size: .6rem; letter-spacing: .3em; text-transform: uppercase; color: var(--accent); }
    .social-handle { font-family: var(--ff-body); font-size: 1.1rem; font-weight: 700; }

    footer { padding: 48px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    footer p { font-family: var(--ff-mono); font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width:900px) {
      nav { padding: 24px; }
      .nav-links { display: none; }
      #hero { grid-template-columns: 1fr; height: auto; }
      .hero-right { height: 55vh; order: -1; }
      .hero-left { padding: 60px 24px 80px; }
      .music-platforms { grid-template-columns: 1fr; }
      .social-grid { flex-direction: column; align-items: stretch; }
      footer { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <nav>
    <a href="#hero" class="nav-logo">MUTT</a>
    <ul class="nav-links">
      <li><a href="#music">Music</a></li>
      <li><a href="#connect">Connect</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="hero-left">
      <p class="hero-tag">DJ &amp; Producer — Nova Friburgo / RJ</p>
      <h1 class="hero-title">MUTT</h1>
      <p class="hero-sub">Na festa ou no estúdio, <strong>sempre MUTT.</strong></p>
      <a href="https://on.soundcloud.com/VIZ3Erevj6qx3DhwML" target="_blank" rel="noopener" class="hero-cta">Ouvir agora</a>
    </div>
    <div class="hero-right">
      <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=2070" alt="MUTT DJ">
    </div>
  </section>

  <section id="music">
    <div class="section-label">Discografia</div>
    <h2>Onde ouvir</h2>
    <div class="music-platforms">
      <a href="https://on.soundcloud.com/VIZ3Erevj6qx3DhwML" target="_blank" rel="noopener" class="platform-card">
        <span class="platform-name">SoundCloud</span>
      </a>
      <a href="https://open.spotify.com/artist/0" target="_blank" rel="noopener" class="platform-card">
        <span class="platform-name">Spotify</span>
      </a>
      <a href="https://www.youtube.com/@MUTTMUSIC" target="_blank" rel="noopener" class="platform-card">
        <span class="platform-name">YouTube</span>
      </a>
    </div>
  </section>

  <section id="connect">
    <div class="section-label">Network</div>
    <h2>Social</h2>
    <div class="social-grid">
      <a href="https://www.instagram.com/mutt_music_?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener" class="social-link">
        <span class="social-platform">Instagram</span>
        <span class="social-handle">@mutt_music_</span>
      </a>
    </div>
  </section>

  <footer>
    <p>© 2025 MUTT — Todos os direitos reservados</p>
    <p>Nova Friburgo · RJ · BR</p>
  </footer>

  <script>
    const cur = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
    (function loop(){
      rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
      cur.style.left=mx+'px'; cur.style.top=my+'px';
      ring.style.left=rx+'px'; ring.style.top=ry+'px';
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
